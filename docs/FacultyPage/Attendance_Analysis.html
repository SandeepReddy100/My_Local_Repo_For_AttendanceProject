<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Attendance Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --color-primary: #00796B;
      --color-danger: #ff7782;
      --color-success: #41f1b6;
      --color-warning: #ffbb55;
      --color-white: #fff;
      --color-info: #7d8da1;
      --color-dark: #363949;
      --color-light: rgba(132, 139, 200, 0.18);
      --color-dark-varient: #677483;
      --color-background: #f6f6f9;

      --card-border-radius: 2rem;
      --border-radius-1: 0.4rem;
      --border-radius-2: 1.2rem;

      --card-padding: 1.8rem;
      --box-shadow: 0 2rem 3rem var(--color-light);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--color-background);
      color: var(--color-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .chart-container {
      width: 100%;
      max-width: 1000px;
      background-color: var(--color-white);
      padding: var(--card-padding);
      border-radius: var(--card-border-radius);
      box-shadow: var(--box-shadow);
      margin-bottom: 2rem;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }

    table {
      width: 100%;
      max-width: 1000px;
      border-collapse: collapse;
      background-color: var(--color-white);
      box-shadow: var(--box-shadow);
      border-radius: var(--card-border-radius);
      overflow: hidden;
    }

    th, td {
      padding: 1rem;
      text-align: center;
      border-bottom: 1px solid var(--color-light);
    }

    th {
      background-color: var(--color-primary);
      color: var(--color-white);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tfoot td {
      font-weight: bold;
      background-color: var(--color-light);
    }

    @media (max-width: 600px) {
      .chart-container, table {
        padding: 1rem;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="chart-container">
    <canvas id="attendanceChart"></canvas>
  </div>

  <table id="attendanceTable">
    <thead>
      <tr>
        <th>Group</th>
        <th>Present</th>
        <th>Absent</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody></tbody>
    <tfoot>
      <tr>
        <td>Total</td>
        <td id="totalPresent">0</td>
        <td id="totalAbsent">0</td>
        <td id="grandTotal">0</td>
      </tr>
    </tfoot>
  </table>

  <script>
    const batchSelected = (localStorage.getItem('selectedbatch') || '').toUpperCase();
    
    console.log(batchSelected);
    console.log("hi");
    const todayKey = new Date().toISOString().split('T')[0];

    // Load stored attendance or initialize
    let storedAttendance = JSON.parse(localStorage.getItem('attendanceData')) || {};
    if (!storedAttendance[todayKey]) {
      storedAttendance = { [todayKey]: [] };
    }

    const allGroups = [
      { name: "SKILLUP-1", present: 45, absent: 5 },
      { name: "Group B", present: 50, absent: 10 },
      { name: "Group C", present: 40, absent: 15 },
      { name: "Group D", present: 35, absent: 20 },
      { name: "Group E", present: 60, absent: 5 },
      { name: "Group F", present: 55, absent: 8 },
      { name: "Group G", present: 70, absent: 4 },
      { name: "Group H", present: 48, absent: 12 },
      { name: "Group I", present: 52, absent: 8 },
      { name: "Group J", present: 46, absent: 10 }
    ];

//    const batchSelected = (localStorage.getItem('selectedbatch') || '').toUpperCase();

const selectedGroup = allGroups.find(group => group.name.toUpperCase() === batchSelected);
if (selectedGroup && !storedAttendance[todayKey].some(g => g.name.toUpperCase() === selectedGroup.name.toUpperCase())) {
  storedAttendance[todayKey].push(selectedGroup);
  localStorage.setItem('attendanceData', JSON.stringify(storedAttendance));
}

console.log("Batch selected:", batchSelected);
console.log("Matching group:", selectedGroup);

    const dataToDisplay = storedAttendance[todayKey];

    const labels = dataToDisplay.map(g => g.name);
    const presentData = dataToDisplay.map(g => g.present);
    const absentData = dataToDisplay.map(g => g.absent);

    const ctx = document.getElementById('attendanceChart').getContext('2d');
    const attendanceChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Present',
            data: presentData,
            backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--color-success').trim(),
            borderRadius: 8
          },
          {
            label: 'Absent',
            data: absentData,
            backgroundColor: getComputedStyle(document.documentElement).getPropertyValue('--color-danger').trim(),
            borderRadius: 8
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: {
            beginAtZero: true,
            ticks: {
              stepSize: 10,
              color: 'var(--color-dark)'
            }
          },
          x: {
            ticks: {
              color: 'var(--color-dark)'
            }
          }
        },
        plugins: {
          legend: {
            labels: {
              color: 'var(--color-dark)'
            }
          },
          tooltip: {
            backgroundColor: 'var(--color-dark)',
            titleColor: 'var(--color-white)',
            bodyColor: 'var(--color-white)'
          }
        }
      }
    });

    const tableBody = document.querySelector("#attendanceTable tbody");
    let totalPresent = 0, totalAbsent = 0;

    dataToDisplay.forEach(group => {
      const total = group.present + group.absent;
      totalPresent += group.present;
      totalAbsent += group.absent;
      const row = `<tr>
        <td>${group.name}</td>
        <td>${group.present}</td>
        <td>${group.absent}</td>
        <td>${total}</td>
      </tr>`;
      tableBody.insertAdjacentHTML("beforeend", row);
    });

    document.getElementById("totalPresent").textContent = totalPresent;
    document.getElementById("totalAbsent").textContent = totalAbsent;
    document.getElementById("grandTotal").textContent = totalPresent + totalAbsent;
  </script>
</body>

</html>
